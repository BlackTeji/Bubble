[build]
builder = "nixpacks"
buildCommand = "npm install && node server/src/db/migrate.js"

[deploy]
startCommand = "npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "bubble-web"

[env]
NODE_ENV = "production"