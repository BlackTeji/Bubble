[build]
builder = "nixpacks"
buildCommand = "npm install"

[deploy]
startCommand = "node server/src/db/migrate.js && node server/src/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "bubble-web"

[env]
NODE_ENV = "production"